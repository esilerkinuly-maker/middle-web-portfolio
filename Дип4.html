<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeFlow Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f7fc;
  color:#1e293b;
}

/* ================= NAV ================= */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:linear-gradient(135deg,#1e4a6b,#0b3b5c);
  color:white;
  position:sticky;
  top:0;
  z-index:1000;
  animation:fadeUp 0.6s ease;
}

.menu a{
  color:white;
  text-decoration:none;
  margin:0 10px;
  position:relative;
}

.menu a::after{
  content:"";
  position:absolute;
  bottom:-4px;
  left:0;
  width:0%;
  height:2px;
  background:white;
  transition:0.3s;
}

.menu a:hover::after{
  width:100%;
}

/* ================= HERO ================= */
.hero{
  text-align:center;
  padding:50px 20px;
}

/* ================= SECTIONS ================= */
section{
  width:90%;
  max-width:800px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  animation:fadeUp 0.6s ease;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  background:#1e4a6b;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* ================= TIMER ================= */
#timer{
  font-size:40px;
  text-align:center;
  margin:10px 0;
}

/* ================= FOOTER ================= */
.footer{
  text-align:center;
  padding:20px;
  margin-top:30px;
  background:#1e4a6b;
  color:white;
  animation:fadeUp 0.6s ease;
}

/* ================= ANIMATION ================= */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* ================= MEDIA ================= */
@media(max-width:900px){
  .nav{
    flex-direction:column;
    text-align:center;
  }
}

@media(max-width:600px){
  button{
    width:100%;
  }
  #timer{
    font-size:28px;
  }
}
</style>
</head>

<body>

<div class="nav">
  <div><b>Todo и другие</b></div>
  <div class="menu">
    <a href="#todo">ToDo</a>
    <a href="#calc">Calc</a>
    <a href="#pomodoro">Timer</a>
    <a href="#advice">Кеңес</a>
    <a href="#contact">Contact</a>
  </div>
</div>

<div class="hero">
  <h1>Уақытты тиімді басқару</h1>
</div>

<section id="todo">
  <h3>📋 ToDo</h3>
  <input id="taskInput" placeholder="Тапсырма">
  <button onclick="addTask()">Қосу</button>
  <ul id="taskList"></ul>
</section>

<section id="calc">
  <h3>📊 Калькулятор</h3>
  <input id="work" type="number" placeholder="Жұмыс">
  <input id="study" type="number" placeholder="Оқу">
  <input id="rest" type="number" placeholder="Демалыс">
  <button onclick="calc()">Есептеу</button>
  <p id="result">0%</p>
</section>

<section id="pomodoro">
  <h3>⏰ Pomodoro</h3>
  <div id="timer">25:00</div>
  <button onclick="startTimer()">Start</button>
  <button onclick="pauseTimer()">Pause</button>
  <button onclick="resetTimer()">Reset</button>
</section>

<section id="advice">
  <h3>💡 Кеңес</h3>
  <button onclick="getAdvice()">Алу</button>
  <p id="adviceText">...</p>
</section>

<section id="contact">
  <h3>📞 Contact</h3>
  <input id="name" placeholder="Атың">
  <input id="email" placeholder="Email">
  <textarea id="msg" placeholder="Хабарлама"></textarea>
  <button onclick="send()">Жіберу</button>
</section>


<div class="footer">
    By Erkinuly Aqesil
</div>

<script>

function addTask(){
  const i=document.getElementById("taskInput");
  const ul=document.getElementById("taskList");
  if(!i.value) return;
  const li=document.createElement("li");
  li.textContent=i.value;
  li.onclick=()=>li.remove();
  ul.appendChild(li);
  i.value="";
}


function calc(){
  const w=+work.value||0;
  const s=+study.value||0;
  const r=+rest.value||0;
  const t=w+s+r;
  result.textContent=t?Math.round(((w+s)/t)*100)+"%":"0%";
}


let time=1500;
let interval;

function update(){
  let m=Math.floor(time/60);
  let s=time%60;
  timer.textContent=`${m}:${s<10?"0":""}${s}`;
}

function startTimer(){
  if(interval) return;
  interval=setInterval(()=>{
    if(time>0){time--;update();}
    else{clearInterval(interval);interval=null;alert("Бітті!");}
  },1000);
}

function pauseTimer(){
  clearInterval(interval);
  interval=null;
}

function resetTimer(){
  clearInterval(interval);
  interval=null;
  time=1500;
  update();
}

update();


async function getAdvice(){
  let r=await fetch("https://api.adviceslip.com/advice?t="+Date.now());
  let d=await r.json();
  adviceText.textContent=d.slip.advice;
}


function send(){
  if(!name.value||!email.value||!msg.value){
    alert("Жіберілді!");
    return;
  }
  alert("Жіберілді!");
}
</script>

</body>
</html>
